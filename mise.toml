[env]
# Shared environment variables can go here

[tasks.build]
description = "Compile the TypeScript code"
run = "npm run compile"

[tasks.lint]
description = "Run ESLint to check for code issues"
run = "npx eslint ."

[tasks.format]
description = "Run Prettier to format the codebase"
run = "npx prettier --write ."

[tasks.test]
description = "Run unit tests"
run = "npx vitest run"

[tasks.package]
description = "Package the VS Code extension into a .vsix file in the releases folder"
depends = ["build"]
run = [
  "npx shx mkdir -p releases",
  "npx @vscode/vsce package --out releases/skill-tree-chopper.vsix"
]

[tasks.login]
description = "Authenticate with VS Code Marketplace using your Azure PAT"
run = "npx @vscode/vsce login LuminairPrime"

[tasks.check-clean]
hide = true
description = "Verify that the git working directory is clean before publishing"
run = "node -e \"if (require('child_process').execSync('git status --porcelain').toString().trim()) { console.error('\\n❌ ERROR: Git working directory is not clean. Please commit or stash your changes before publishing.\\n'); process.exit(1); }\""

[tasks."publish:patch"]
alias = "publish"
description = "Publish a patch update to VS Code Marketplace (e.g., 1.0.0 -> 1.0.1)"
depends = ["check-clean", "lint", "test", "build"]
run = "npx @vscode/vsce publish patch"

[tasks."publish:minor"]
description = "Publish a minor update to VS Code Marketplace (e.g., 1.0.0 -> 1.1.0)"
depends = ["check-clean", "lint", "test", "build"]
run = "npx @vscode/vsce publish minor"

[tasks."publish:major"]
description = "Publish a major update to VS Code Marketplace (e.g., 1.0.0 -> 2.0.0)"
depends = ["check-clean", "lint", "test", "build"]
run = "npx @vscode/vsce publish major"

[tasks.clean]
description = "Clean up built files and releases"
run = [
  "npx shx rm -rf out",
  "npx shx rm -rf releases"
]
