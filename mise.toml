[env]
# Shared environment variables can go here
NODE_OPTIONS = "--no-deprecation"

[tasks.build]
description = "Compile the TypeScript code"
run = "npm run compile"

[tasks.lint]
description = "Run ESLint to check for code issues"
run = "npx eslint ."

[tasks.format]
description = "Run Prettier to format the codebase"
run = "npx prettier --write ."

[tasks.test]
description = "Run unit tests"
run = "npx vitest run"

[tasks.package]
description = "Package the VS Code extension into a .vsix file in the releases folder"
depends = ["build"]
run = [
  "npx shx mkdir -p releases",
  "npx @vscode/vsce package --out releases/skill-tree-chopper.vsix"
]

[tasks.check-clean]
hide = true
description = "Verify that the git working directory is clean before publishing"
run = "node scripts/check-clean.js"

[tasks."release:patch"]
alias = "release"
description = "Bump patch version, push tag to trigger CI publishing (Open VSX + MS)"
depends = ["check-clean", "lint", "test", "build"]
run = [
  "npm version patch",
  "git push --follow-tags"
]

[tasks."release:minor"]
description = "Bump minor version, push tag to trigger CI publishing (Open VSX + MS)"
depends = ["check-clean", "lint", "test", "build"]
run = [
  "npm version minor",
  "git push --follow-tags"
]

[tasks."release:major"]
description = "Bump major version, push tag to trigger CI publishing (Open VSX + MS)"
depends = ["check-clean", "lint", "test", "build"]
run = [
  "npm version major",
  "git push --follow-tags"
]

[tasks.clean]
description = "Clean up built files and releases"
run = [
  "npx shx rm -rf out",
  "npx shx rm -rf releases"
]
